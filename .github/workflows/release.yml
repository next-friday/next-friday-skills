name: Release

on:
  push:
    branches: [main]
    paths:
      - ".changeset/**"
      - "plugins/*/package.json"
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  version-pr:
    name: Open or update the version PR
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token }}
      - uses: ./.github/common-actions/bootstrap
      - uses: changesets/action@3841a0683d3cfa6dae0f9bb335290003010fe3f0
        id: changesets
        with:
          version: pnpm release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Enable auto-merge on the version PR
        if: ${{ steps.changesets.outputs.hasChangesets == 'true' && steps.changesets.outputs.pullRequestNumber != '' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR: ${{ steps.changesets.outputs.pullRequestNumber }}
          REPO: ${{ github.repository }}
        run: gh pr merge "$PR" --repo "$REPO" --auto --squash
