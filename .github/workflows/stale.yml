name: Stale

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

concurrency:
  group: stale
  cancel-in-progress: false

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale issues and PRs
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: "status:stale"
          stale-pr-label: "status:stale"
          exempt-issue-labels: "status:needs-human-review"
          stale-issue-message: "This issue has been inactive for 60 days and will close in 14 days without further activity."
          stale-pr-message: "This pull request has been inactive for 60 days and will close in 14 days without further activity."
