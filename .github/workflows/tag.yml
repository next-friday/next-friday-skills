name: Tag

on:
  push:
    branches: [main]
    paths:
      - "plugins/*/package.json"

concurrency:
  group: tag
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  tag:
    name: Tag and release on a version change
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Create tag and GitHub Release when the plugin version changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./plugins/next-friday/package.json').version")
          if [ "$VERSION" = "0.0.0" ]; then
            echo "Version is the 0.0.0 placeholder — not a release, nothing to tag."
            exit 0
          fi
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — version unchanged, nothing to release."
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" --generate-notes
          echo "Released $TAG"
