version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: "chore"
      include: scope
    groups:
      commitlint:
        patterns:
          - "husky"
          - "@commitlint/*"
      changesets:
        patterns:
          - "@changesets/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    labels:
      - ci
      - dependencies
    commit-message:
      prefix: "ci"
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"
